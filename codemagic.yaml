workflows:
  omi-ios-local-workflow:
    name: Omi iOS Local Build
    instance_type: mac_mini_m1
    max_build_duration: 30
    working_directory: app
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - name: Install dependencies
        script: |
          flutter pub get
      - name: Generate Envied Bindings
        script: |
          # This bakes our Tailscale IP from Phase 1 into the Dart code
          flutter pub run build_runner build --delete-conflicting-outputs
      - name: Build iOS Unsigned
        script: |
          # Build for release but skip code signing (we'll sign locally with Sideloadly)
          flutter build ios --release --no-codesign --flavor prod
      - name: Prepare Artifact
        script: |
          # Zip the .app folder so it's easily downloadable
          cd build/ios/iphoneos
          zip -r Omi_Unsigned.zip Runner.app
    artifacts:
      - app/build/ios/iphoneos/Omi_Unsigned.zip
